<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppSphere — Ritorno login</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'DM Sans',Segoe UI,sans-serif; background:#0081C8; color:#fff;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { text-align:center; max-width:360px; width:100%; }
  .logo { font-size:2rem; font-weight:700; margin-bottom:10px; letter-spacing:.5px; }
  .sub { opacity:.9; font-size:.98rem; margin-bottom:28px; line-height:1.5; }
  .btn { display:inline-block; background:#fff; color:#0081C8; font-weight:700; font-size:1.08rem;
         border:none; border-radius:12px; padding:16px 28px; cursor:pointer; text-decoration:none;
         box-shadow:0 6px 20px rgba(0,0,0,.25); width:100%; }
  .btn:active { transform:translateY(1px); }
  .err { margin-top:18px; font-size:.86rem; opacity:.9; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">⬢ AppSphere</div>
    <div class="sub" id="sub">Accesso completato.<br>Tocca per tornare nell'app.</div>
    <a class="btn" id="openBtn" href="#">Apri AppSphere</a>
    <div class="err" id="err"></div>
  </div>
  <script>
    (function () {
      // I token OAuth arrivano nel fragment: #access_token=...&refresh_token=...&provider_token=...
      var hash = window.location.hash || '';
      var deepLink = 'garsalapps://oauth' + hash;
      var btn = document.getElementById('openBtn');
      btn.setAttribute('href', deepLink);

      if (!hash || hash.indexOf('access_token') === -1) {
        document.getElementById('sub').innerHTML =
          'Nessun token ricevuto.<br>Riprova il login da AppSphere.';
        btn.style.display = 'none';
        return;
      }

      // Tentativo automatico di rientro nell'app. Se un App Link verificato è
      // attivo l'app è già stata aperta e questa pagina non viene mostrata.
      // Chrome può bloccare l'auto-redirect verso lo schema custom: in tal caso
      // resta il pulsante, che parte da un tap dell'utente (sempre permesso).
      try { window.location.replace(deepLink); } catch (e) {}

      btn.addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = deepLink;
      });
    })();
  </script>
</body>
</html>
