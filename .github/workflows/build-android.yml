name: Build Android APK

on:
  push:
    branches:
      - master
      - 'claude/**'
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Build debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GarsalApps-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Pubblica APK su master (scaricabile via Netlify)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copia APK nella cartella releases/
          mkdir -p releases
          cp android-app/app/build/outputs/apk/debug/app-debug.apk releases/GarsalApps-latest.apk

          # Aggiorna anche su master direttamente
          git fetch origin master
          git checkout master
          git reset --hard origin/master

          mkdir -p releases
          cp android-app/app/build/outputs/apk/debug/app-debug.apk releases/GarsalApps-latest.apk

          git add releases/GarsalApps-latest.apk
          git diff --staged --quiet && echo "APK non cambiato, skip commit" && exit 0

          # Legge la versionName dall'app/build.gradle
          VERSION=$(grep versionName android-app/app/build.gradle | grep -o '"[^"]*"' | tr -d '"' | head -1)
          git commit -m "chore: aggiorna APK GarsalApps v${VERSION} [skip ci]"
          git push origin master
