name: Build Android APK
# v5 — firma con keystore fisso da GitHub Secrets (aggiornamento senza disinstallare)

on:
  push:
    branches:
      - master
      - 'claude/**'
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDKMANAGER=$(find "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools" \
            -name "sdkmanager" -type f 2>/dev/null | sort | tail -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "WARNING: sdkmanager non trovato, continuo senza accettazione licenze"
          else
            echo "Usando sdkmanager: $SDKMANAGER"
            yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
            "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" 2>&1 || true
          fi

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Decodifica keystore da secret
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/garsal.keystore
            echo "KEYSTORE_PRESENTE=true" >> $GITHUB_ENV
          else
            echo "⚠️  KEYSTORE_BASE64 non configurato — uso debug build"
            echo "KEYSTORE_PRESENTE=false" >> $GITHUB_ENV
          fi

      - name: Build APK (release firmato o debug)
        working-directory: android-app
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android-app/garsal.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "$KEYSTORE_PRESENTE" = "true" ]; then
            echo "✅ Build release firmata"
            ./gradlew assembleRelease --no-daemon
            cp app/build/outputs/apk/release/app-release.apk /tmp/GarsalApps-latest.apk
          else
            echo "⚠️  Build debug (firma temporanea)"
            ./gradlew assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk /tmp/GarsalApps-latest.apk
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GarsalApps
          path: /tmp/GarsalApps-latest.apk
          retention-days: 30

      - name: Pubblica APK su master (scaricabile via Netlify)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION=$(grep versionName android-app/app/build.gradle | grep -o '"[^"]*"' | tr -d '"' | head -1)

          git fetch origin master
          git checkout master
          git reset --hard origin/master

          mkdir -p releases
          cp /tmp/GarsalApps-latest.apk releases/GarsalApps-latest.apk

          git add releases/GarsalApps-latest.apk
          git diff --staged --quiet && echo "APK non cambiato, skip commit" && exit 0

          git commit -m "chore: aggiorna APK GarsalApps v${VERSION} [skip actions]"
          git push origin master
