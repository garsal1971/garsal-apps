name: Build Android APK
# v8 — genera keystore automaticamente se KEYSTORE_BASE64 non configurato

on:
  push:
    branches:
      - master
      - 'claude/**'
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDKMANAGER=$(find "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools" \
            -name "sdkmanager" -type f 2>/dev/null | sort | tail -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "WARNING: sdkmanager non trovato"
          else
            yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
            "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" 2>&1 || true
          fi

      - name: Prepara keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/garsal.keystore
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                  >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"            >> $GITHUB_ENV
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "✅ Keystore dai secrets — build release con firma fissa"
          else
            KS_PASS="GarsalApps2026"
            keytool -genkeypair -v \
              -keystore android-app/garsal.keystore \
              -alias garsal \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=GarsalApps, O=Garsal, C=IT"
            echo "KEYSTORE_PASSWORD=$KS_PASS" >> $GITHUB_ENV
            echo "KEY_ALIAS=garsal"           >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KS_PASS"      >> $GITHUB_ENV
            echo "generated=true" >> $GITHUB_OUTPUT

            mkdir -p /tmp/keystore-setup
            base64 -w 0 android-app/garsal.keystore > /tmp/keystore-setup/KEYSTORE_BASE64.txt
            echo "$KS_PASS" > /tmp/keystore-setup/KEYSTORE_PASSWORD.txt
            echo "garsal"   > /tmp/keystore-setup/KEY_ALIAS.txt
            echo "$KS_PASS" > /tmp/keystore-setup/KEY_PASSWORD.txt
            cat > /tmp/keystore-setup/ISTRUZIONI.txt << 'EOF'
======================================================
KEYSTORE GENERATO — AZIONE RICHIESTA (una volta sola)
======================================================
Aggiungi questi 4 secrets su GitHub:
→ github.com/garsal1971/garsal-apps/settings/secrets/actions

1. KEYSTORE_BASE64   = contenuto di KEYSTORE_BASE64.txt
2. KEYSTORE_PASSWORD = contenuto di KEYSTORE_PASSWORD.txt
3. KEY_ALIAS         = contenuto di KEY_ALIAS.txt
4. KEY_PASSWORD      = contenuto di KEY_PASSWORD.txt

Dopo aver aggiunto i secrets, ogni aggiornamento APK
si installerà senza disinstallare la versione precedente.
======================================================
EOF
            echo "⚠️  Keystore generato — scarica artifact 'keystore-setup' e aggiungi i 4 secrets"
          fi

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Build APK release
        working-directory: android-app
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="${{ github.workspace }}/android-app/garsal.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Salva APK e versione
        run: |
          VERSION=$(grep versionName android-app/app/build.gradle | grep -o '"[^"]*"' | tr -d '"' | head -1)
          cp android-app/app/build/outputs/apk/release/app-release.apk /tmp/GarsalApps-latest.apk
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GarsalApps-v${{ env.VERSION }}
          path: /tmp/GarsalApps-latest.apk
          retention-days: 30

      - name: Upload keystore-setup artifact
        if: steps.keystore.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: keystore-setup
          path: /tmp/keystore-setup/
          retention-days: 7

      - name: Pubblica APK su master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin master
          git checkout master
          git reset --hard origin/master

          mkdir -p releases
          cp /tmp/GarsalApps-latest.apk releases/GarsalApps-latest.apk

          git add releases/GarsalApps-latest.apk
          git diff --staged --quiet && echo "APK non cambiato, skip commit" && exit 0

          git commit -m "chore: aggiorna APK GarsalApps v${{ env.VERSION }} [skip actions]"
          git push origin master
