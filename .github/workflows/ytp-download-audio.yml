name: YTP — Download Audio

on:
  repository_dispatch:
    types: [ytp-download-audio]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Installa dipendenze
        run: |
          pip install pytubefix
          sudo apt-get install -y ffmpeg

      - name: Segna come "processing"
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?id=eq.${{ github.event.client_payload.item_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"audio_status":"processing"}'

      - name: Download audio via pytubefix
        run: |
          cat > /tmp/download.py << 'PYEOF'
          import sys, subprocess, os
          from pytubefix import YouTube

          ytid = os.environ["YTID"]
          print(f"Download: https://www.youtube.com/watch?v={ytid}")

          yt     = YouTube(f"https://www.youtube.com/watch?v={ytid}")
          stream = yt.streams.filter(only_audio=True).order_by("abr").last()
          if not stream:
              print("Nessun stream audio trovato", file=sys.stderr)
              sys.exit(1)

          print(f"Stream selezionato: {stream.abr}")
          raw = stream.download(output_path="/tmp", filename="raw")
          print(f"File scaricato: {raw}")

          r = subprocess.run([
              "ffmpeg", "-y", "-i", raw,
              "-codec:a", "libmp3lame", "-qscale:a", "5",
              "/tmp/dl.mp3"
          ])
          sys.exit(r.returncode)
          PYEOF
          YTID="${{ github.event.client_payload.youtube_id }}" python3 /tmp/download.py
          ls -lh /tmp/dl.mp3

      - name: Upload su Supabase Storage
        run: |
          YTID="${{ github.event.client_payload.youtube_id }}"
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/ytp-audio/${YTID}.mp3" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: audio/mpeg" \
            -H "x-upsert: true" \
            --data-binary @"/tmp/dl.mp3"

      - name: Aggiorna DB — ready
        run: |
          YTID="${{ github.event.client_payload.youtube_id }}"
          AUDIO_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/ytp-audio/${YTID}.mp3"
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?youtube_id=eq.${YTID}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"audio_url\":\"${AUDIO_URL}\",\"audio_status\":\"ready\"}"

      - name: Aggiorna DB — error (solo se fallisce)
        if: failure()
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?id=eq.${{ github.event.client_payload.item_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"audio_status":"error"}'
