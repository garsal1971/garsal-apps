name: YTP — Download Audio

on:
  repository_dispatch:
    types: [ytp-download-audio]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Installa ffmpeg e yt-dlp (fallback)
        run: |
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp

      - name: Segna come "processing"
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?id=eq.${{ github.event.client_payload.item_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"audio_status":"processing"}'

      - name: Download audio (Piped → Invidious → cobalt → yt-dlp)
        run: |
          YTID="${{ github.event.client_payload.youtube_id }}"
          AUDIO_URL=""

          # ── Metodo 1: Piped API ──────────────────────────────────
          echo "=== Metodo 1: Piped API ==="
          for INSTANCE in \
            "https://pipedapi.kavin.rocks" \
            "https://api.piped.yt" \
            "https://pipedapi.moomoo.me" \
            "https://piped-api.garudalinux.org" \
            "https://pipedapi.adminforge.de" \
            "https://pipedapi.in.projectsegfau.lt"
          do
            echo "  → $INSTANCE"
            RESP=$(curl -s --max-time 12 -H "Accept: application/json" \
              "$INSTANCE/streams/$YTID" 2>/dev/null || true)
            URL=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            s = d.get('audioStreams', [])
            if s:
              print(max(s, key=lambda x: x.get('bitrate',0))['url'])
          except: pass
          " 2>/dev/null || true)
            if [ -n "$URL" ]; then
              echo "  ✅ OK"
              AUDIO_URL="$URL"
              break
            fi
          done

          # ── Metodo 2: Invidious API ──────────────────────────────
          if [ -z "$AUDIO_URL" ]; then
            echo "=== Metodo 2: Invidious API ==="
            for INSTANCE in \
              "https://inv.riverside.rocks" \
              "https://invidious.flokinet.is" \
              "https://y.com.sb" \
              "https://invidious.projectsegfau.lt" \
              "https://invidious.nerdvpn.de"
            do
              echo "  → $INSTANCE"
              RESP=$(curl -s --max-time 12 \
                "$INSTANCE/api/v1/videos/$YTID?fields=adaptiveFormats" 2>/dev/null || true)
              URL=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            af = [f for f in d.get('adaptiveFormats', []) if 'audio' in f.get('type','')]
            if af:
              print(max(af, key=lambda x: int(x.get('bitrate',0)))['url'])
          except: pass
          " 2>/dev/null || true)
              if [ -n "$URL" ]; then
                echo "  ✅ OK"
                AUDIO_URL="$URL"
                break
              fi
            done
          fi

          # ── Metodo 3: cobalt.tools ───────────────────────────────
          if [ -z "$AUDIO_URL" ]; then
            echo "=== Metodo 3: cobalt.tools ==="
            RESP=$(curl -s --max-time 20 \
              -X POST "https://api.cobalt.tools/" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "{\"url\":\"https://www.youtube.com/watch?v=$YTID\",\"downloadMode\":\"audio\"}" \
              2>/dev/null || true)
            URL=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            if d.get('status') in ('tunnel','redirect','stream'):
              print(d.get('url',''))
          except: pass
          " 2>/dev/null || true)
            if [ -n "$URL" ]; then
              echo "  ✅ cobalt OK"
              AUDIO_URL="$URL"
            fi
          fi

          # ── Download + conversione ───────────────────────────────
          if [ -n "$AUDIO_URL" ]; then
            echo "=== Download da URL ==="
            curl -L --max-time 300 -o /tmp/dl_raw "$AUDIO_URL"
            echo "=== Conversione MP3 ==="
            ffmpeg -i /tmp/dl_raw -codec:a libmp3lame -qscale:a 5 -y /tmp/dl.mp3

          # ── Fallback finale: yt-dlp ──────────────────────────────
          else
            echo "=== Fallback: yt-dlp ==="
            yt-dlp \
              -x --audio-format mp3 --audio-quality 5 \
              --no-playlist \
              --extractor-args "youtube:player_client=ios" \
              --extractor-retries 5 \
              --fragment-retries 5 \
              -o "/tmp/dl.%(ext)s" \
              "https://www.youtube.com/watch?v=${YTID}"
          fi

          ls -lh /tmp/dl.mp3

      - name: Upload su Supabase Storage
        run: |
          YTID="${{ github.event.client_payload.youtube_id }}"
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/ytp-audio/${YTID}.mp3" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: audio/mpeg" \
            -H "x-upsert: true" \
            --data-binary @"/tmp/dl.mp3"

      - name: Aggiorna DB — ready
        run: |
          YTID="${{ github.event.client_payload.youtube_id }}"
          AUDIO_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/ytp-audio/${YTID}.mp3"
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?youtube_id=eq.${YTID}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"audio_url\":\"${AUDIO_URL}\",\"audio_status\":\"ready\"}"

      - name: Aggiorna DB — error (solo se fallisce)
        if: failure()
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?id=eq.${{ github.event.client_payload.item_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"audio_status":"error"}'
