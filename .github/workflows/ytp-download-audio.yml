name: YTP — Download Audio

on:
  repository_dispatch:
    types: [ytp-download-audio]

jobs:
  download:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Verifica yt-dlp e ffmpeg
        run: |
          yt-dlp --version
          ffmpeg -version | head -1

      - name: Segna come "processing"
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?id=eq.${{ github.event.client_payload.item_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"audio_status":"processing"}'

      - name: Download audio (MP3)
        run: |
          YTID="${{ github.event.client_payload.youtube_id }}"
          yt-dlp \
            -x --audio-format mp3 --audio-quality 5 \
            --no-playlist \
            --cookies-from-browser chrome \
            --extractor-retries 3 \
            --fragment-retries 3 \
            -o "$RUNNER_TEMP/dl.%(ext)s" \
            "https://www.youtube.com/watch?v=${YTID}"
          ls -lh "$RUNNER_TEMP/dl.mp3"

      - name: Upload su Supabase Storage
        run: |
          YTID="${{ github.event.client_payload.youtube_id }}"
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/ytp-audio/${YTID}.mp3" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: audio/mpeg" \
            -H "x-upsert: true" \
            --data-binary @"$RUNNER_TEMP/dl.mp3"

      - name: Aggiorna DB — ready
        run: |
          YTID="${{ github.event.client_payload.youtube_id }}"
          AUDIO_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/ytp-audio/${YTID}.mp3"
          # Aggiorna tutti gli item con questo youtube_id
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?youtube_id=eq.${YTID}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"audio_url\":\"${AUDIO_URL}\",\"audio_status\":\"ready\"}"

      - name: Aggiorna DB — error (solo se fallisce)
        if: failure()
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/ytp_playlist_items?id=eq.${{ github.event.client_payload.item_id }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"audio_status":"error"}'
