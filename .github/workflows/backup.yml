name: Supabase DB Backup

on:
  schedule:
    # Ogni notte alle 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Avvio manuale dal tab Actions su GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Force IPv4 DNS resolution
        run: |
          DB_HOST="db.jajlmmdsjlvzgcxiiypk.supabase.co"
          # Risolve in IPv4 e lo fissa in /etc/hosts così pg_dump non usa mai IPv6
          IPV4=$(python3 -c "import socket; print(socket.getaddrinfo('${DB_HOST}', 5432, socket.AF_INET)[0][4][0])")
          echo "Resolved IPv4: ${IPV4}"
          echo "${IPV4} ${DB_HOST}" | sudo tee -a /etc/hosts
          # Verifica
          getent hosts "${DB_HOST}"

      - name: Run pg_dump (schema + data)
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          TIMESTAMP=$(date -u '+%Y%m%d_%H%M%S')
          FILENAME="backup_${TIMESTAMP}.sql"

          pg_dump \
            --host=db.jajlmmdsjlvzgcxiiypk.supabase.co \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --no-password \
            --format=plain \
            --no-owner \
            --no-acl \
            --schema=public \
            --file="${FILENAME}"

          echo "FILENAME=${FILENAME}" >> $GITHUB_ENV
          echo "Backup completato: $(du -sh ${FILENAME} | cut -f1)"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.FILENAME }}
          retention-days: 90
