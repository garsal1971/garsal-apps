name: Supabase DB Backup

on:
  schedule:
    # Ogni notte alle 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Avvio manuale dal tab Actions su GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump schema + data
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          TIMESTAMP=$(date -u '+%Y%m%d_%H%M%S')
          SCHEMA_FILE="backup_schema_${TIMESTAMP}.sql"
          DATA_FILE="backup_data_${TIMESTAMP}.sql"

          supabase db dump \
            --project-ref jajlmmdsjlvzgcxiiypk \
            --password "${SUPABASE_DB_PASSWORD}" \
            -f "${SCHEMA_FILE}"

          supabase db dump \
            --project-ref jajlmmdsjlvzgcxiiypk \
            --password "${SUPABASE_DB_PASSWORD}" \
            --data-only \
            -f "${DATA_FILE}"

          echo "SCHEMA_FILE=${SCHEMA_FILE}" >> $GITHUB_ENV
          echo "DATA_FILE=${DATA_FILE}"     >> $GITHUB_ENV
          echo "Schema: $(du -sh ${SCHEMA_FILE} | cut -f1) — Data: $(du -sh ${DATA_FILE} | cut -f1)"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: |
            ${{ env.SCHEMA_FILE }}
            ${{ env.DATA_FILE }}
          # Artefatti conservati 90 giorni (max gratuito su GitHub Actions)
          retention-days: 90
