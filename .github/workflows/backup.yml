name: Supabase DB Backup

on:
  schedule:
    # Ogni notte alle 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Avvio manuale dal tab Actions su GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump (schema + data, IPv4 forzato)
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          TIMESTAMP=$(date -u '+%Y%m%d_%H%M%S')
          FILENAME="backup_${TIMESTAMP}.sql"
          DB_HOST="db.jajlmmdsjlvzgcxiiypk.supabase.co"

          # Risolve il nome host in IPv4 per evitare il problema IPv6 di GitHub Actions
          IPV4=$(getent ahostsv4 "${DB_HOST}" | awk '/STREAM/{print $1; exit}')
          echo "Host risolto: ${DB_HOST} → ${IPV4}"

          PGHOSTADDR="${IPV4}" pg_dump \
            --host="${DB_HOST}" \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --no-password \
            --format=plain \
            --no-owner \
            --no-acl \
            --schema=public \
            --file="${FILENAME}"

          echo "FILENAME=${FILENAME}" >> $GITHUB_ENV
          echo "Backup completato: $(du -sh ${FILENAME} | cut -f1)"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.FILENAME }}
          retention-days: 90
