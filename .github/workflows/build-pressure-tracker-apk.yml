name: Build Pressure Tracker APK

on:
  push:
    branches:
      - master
      - 'claude/**'
    paths:
      - 'pressure-tracker.html'
      - 'android-app/pressure-tracker/**'
      - '.github/workflows/build-pressure-tracker-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDKMANAGER=$(find "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools" \
            -name "sdkmanager" -type f 2>/dev/null | sort | tail -1)
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
            "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" 2>&1 || true
          fi

      - name: Incorpora HTML come asset
        run: |
          cp pressure-tracker.html \
            android-app/pressure-tracker/app/src/main/assets/pressure-tracker.html
          echo "✅ pressure-tracker.html copiato negli asset"

      - name: Prepara keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
              > android-app/pressure-tracker/pt.keystore
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                  >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"            >> $GITHUB_ENV
            echo "generated=false" >> $GITHUB_OUTPUT
          else
            KS_PASS="PressureTracker2026"
            keytool -genkeypair -v \
              -keystore android-app/pressure-tracker/pt.keystore \
              -alias pressuretracker \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=PressureTracker, O=Garsal, C=IT"
            echo "KEYSTORE_PASSWORD=$KS_PASS" >> $GITHUB_ENV
            echo "KEY_ALIAS=pressuretracker"  >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KS_PASS"      >> $GITHUB_ENV
            echo "generated=true" >> $GITHUB_OUTPUT
          fi

      - name: Make gradlew executable
        run: chmod +x android-app/pressure-tracker/gradlew

      - name: Build APK release
        working-directory: android-app/pressure-tracker
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="${{ github.workspace }}/android-app/pressure-tracker/pt.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Salva APK e versione
        run: |
          VERSION=$(grep versionName android-app/pressure-tracker/app/build.gradle \
            | grep -o '"[^"]*"' | tr -d '"' | head -1)
          cp android-app/pressure-tracker/app/build/outputs/apk/release/app-release.apk \
            /tmp/PressureTracker-latest.apk
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PressureTracker-v${{ env.VERSION }}
          path: /tmp/PressureTracker-latest.apk
          retention-days: 30

      - name: Pubblica APK su master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin master
          git checkout master
          git reset --hard origin/master

          mkdir -p releases
          cp /tmp/PressureTracker-latest.apk releases/PressureTracker-latest.apk

          git add releases/PressureTracker-latest.apk
          git diff --staged --quiet \
            && echo "APK non cambiato, skip commit" \
            && exit 0

          git commit -m "build: aggiorna PressureTracker APK v${{ env.VERSION }} [skip actions]"
          git push origin master
