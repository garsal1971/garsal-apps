name: Build SmartBlocker APK

on:
  push:
    branches:
      - master
      - 'claude/**'
    paths:
      - 'android-app/smartblocker/**'
      - 'android-app/settings.gradle'
      - 'android-app/build.gradle'
      - '.github/workflows/build-smartblocker.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDKMANAGER=$(find "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}/cmdline-tools" \
            -name "sdkmanager" -type f 2>/dev/null | sort | tail -1)
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
            "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" 2>&1 || true
          fi

      - name: Prepara keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/garsal.keystore
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                  >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"            >> $GITHUB_ENV
            echo "✅ Keystore dai secrets — build release con firma fissa"
          else
            echo "⚠️  KEYSTORE_BASE64 non configurato — impossibile firmare in modo stabile"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Build SmartBlocker release APK
        working-directory: android-app
        run: |
          ./gradlew :smartblocker:assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="${{ github.workspace }}/android-app/garsal.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartBlocker-release
          path: android-app/smartblocker/build/outputs/apk/release/smartblocker-release.apk
          retention-days: 30

      - name: Pubblica APK su master (scaricabile via Netlify)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION=$(grep versionName android-app/smartblocker/build.gradle | grep -o '"[^"]*"' | tr -d '"' | head -1)
          cp android-app/smartblocker/build/outputs/apk/release/smartblocker-release.apk /tmp/SmartBlocker-latest.apk

          git fetch origin master
          git checkout master
          git reset --hard origin/master

          mkdir -p releases
          cp /tmp/SmartBlocker-latest.apk releases/SmartBlocker-latest.apk

          git add releases/SmartBlocker-latest.apk
          git diff --staged --quiet && echo "APK non cambiato, skip commit" && exit 0

          git commit -m "chore: aggiorna APK SmartBlocker v${VERSION} [skip actions]"
          git push origin master
