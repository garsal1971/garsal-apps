[build]
  publish = "."
  base = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/app-launcher.html"
  status = 200

[[redirects]]
  from = "/tests/dashboard"
  to = "/test-dashboard.html"
  status = 200

# HTML mai in cache: l'app (WebView) carica la root "/" e deve sempre ricevere
# l'ultima versione, altrimenti resta su un app-launcher vecchio (login rotto).
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/releases/*.apk"
  [headers.values]
    Content-Type = "application/vnd.android.package-archive"
    Content-Disposition = "attachment"

# ── Branch deploy per dev/** ──────────────────────────────────────────────────
# I branch dev/** ottengono un URL preview: dev--<branch>--<sitename>.netlify.app
# NON vengono auto-mergiati su master (workflow separato deploy-dev.yml).
# Attivare in Netlify dashboard → Site configuration → Build & deploy →
#   Branch deploys → Branch deploy controls → aggiungere pattern: dev/*
[context.branch-deploy]
  command = ""
  publish = "."
