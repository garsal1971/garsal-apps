<html lang="it">

  <style>

    .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--c-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 600; overflow: hidden; }

    .version-bar { border-top: 1px solid var(--c-border); padding: 7px 22px; font-size: .7rem; color: var(--c-muted); display: flex; align-items: center; gap: 7px; background: var(--c-surface); }
    .btn-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .btn-hamburger span { display: block; width: 20px; height: 2px; background: #fff; border-radius: 2px; }

    #mobile-nav-overlay { display: none; position: fixed; inset: 0; top: 56px; background: rgba(0,0,0,.35); z-index: 98; }

      .sidebar { position: fixed; top: 56px; left: 0; z-index: 99; height: calc(100dvh - 56px); transform: translateX(-100%); transition: transform .25s ease; display: flex; box-shadow: 4px 0 20px rgba(0,0,0,.12); }
      .sidebar.open { transform: translateX(0); }

      .grid-2 { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }

      .kpi-label { font-size: .62rem; margin-bottom: 3px; }
      .kpi-value { font-size: 1rem; }
      .form-row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
'use strict';

const SUPABASE_URL = 'https://jajlmmdsjlvzgcxiiypk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphamxtbWRzamx2emdjeGlpeXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5NTU0NjYsImV4cCI6MjA4NTUzMTQ2Nn0.ikaipwxOvIn43epayQ4mSZQkXtin3aaGEPouafwJFxU';

const S = { session: null, view: 'dashboard', transactions: [], charts: {}, selectedYear: null };

const tok = () => S.session?.access_token || SUPABASE_ANON_KEY;
function sbH(extra = {}) {
  return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${tok()}`, 'Content-Type': 'application/json', ...extra };
}
async function sbQ(table, params = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: sbH() });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).message || r.statusText);
  return r.json();
}
async function sbIns(table, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST', headers: sbH({ 'Prefer': 'return=representation' }), body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).message || r.statusText);
  return (await r.json())[0];
}
async function sbUpd(table, filter, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
    method: 'PATCH', headers: sbH({ 'Prefer': 'return=representation' }), body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).message || r.statusText);
  return r.json();
}
async function sbDel(table, filter) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, { method: 'DELETE', headers: sbH() });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).message || r.statusText);
}

const loadSession = () => { try { return JSON.parse(localStorage.getItem('garsal_session')); } catch { return null; } };
async function initFromSbToken(token) {
  try {
    const user = await (await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` },
    })).json();
    if (user?.id) {
      return { access_token: token, refresh_token: null, expires_at: Date.now() + 3600_000, user };
    }
  } catch {}
  return null;
}
async function refreshSession(session) {
  if (!session?.refresh_token) return null;
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST', headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: session.refresh_token }),
    });
    if (!r.ok) return null;
    const d = await r.json();
    const ns = { access_token: d.access_token, refresh_token: d.refresh_token, expires_at: Date.now() + d.expires_in * 1000, user: d.user };
    localStorage.setItem('garsal_session', JSON.stringify(ns));
    return ns;
  } catch { return null; }
}
async function logout() {
  location.href = '/';
}

const fmtEUR = n => { if (n == null) return '—'; const v = Math.round(n); return (v < 0 ? '-' : '') + Math.abs(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.') + ' €'; };
const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('it-IT') : '—';

const $ = id => document.getElementById(id);
const setHtml = (id, h) => { const el = $(id); if (el) el.innerHTML = h; };

const badgePersona = p => p === 'TERESA' ? '<span class="badge badge-teresa">Teresa</span>' : '<span class="badge badge-salvatore">Salvatore</span>';
const badgeTipo = t => t === 'BONIFICO' ? '<span class="badge badge-bonifico">Bonifico</span>' : t === 'MENSA' ? '<span class="badge badge-mensa">Mensa</span>' : '<span class="badge badge-altro">Altro</span>';
const badgeProvenienza = p => p === 'IMPIANTO' ? '<span class="badge badge-impianto">Impianto</span>' : p === 'IMPORTATO' ? '<span class="badge badge-importato">Importato</span>' : '<span class="badge badge-manuale">Manuale</span>';
const kpi = (label, value, cls = 'neutral') => `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value mono ${cls}">${value}</div></div>`;

async function loadData() {
  S.transactions = await sbQ('acct_transactions', 'select=*&order=data.desc,created_at.desc');
}

function calcolaQuote(anno) {
  const txs = S.transactions.filter(t => t.anno === anno);
  const bonTeresa = txs.filter(t => t.tipo === 'BONIFICO' && t.persona === 'TERESA').reduce((s, t) => s + +t.importo, 0);
  const bonSalva = txs.filter(t => t.tipo === 'BONIFICO' && t.persona === 'SALVATORE').reduce((s, t) => s + +t.importo, 0);
  const altTeresa = txs.filter(t => t.tipo === 'ALTRO' && t.persona === 'TERESA').reduce((s, t) => s + +t.importo, 0);
  const altSalva = txs.filter(t => t.tipo === 'ALTRO' && t.persona === 'SALVATORE').reduce((s, t) => s + +t.importo, 0);
  const mensa = txs.filter(t => t.tipo === 'MENSA').reduce((s, t) => s + +t.importo, 0);
  const versatoTeresa = bonTeresa + altTeresa;
  const versatoSalva = bonSalva + altSalva + mensa;
  const totaleSpeso = versatoTeresa + versatoSalva;
  const quotaTeresa = anno <= 2023 ? totaleSpeso * 2 / 5 : totaleSpeso / 3;
  const quotaSalva = totaleSpeso - quotaTeresa;
  const diffTeresa = versatoTeresa - quotaTeresa;
  const diffSalva = versatoSalva - quotaSalva;
  return { anno, bonTeresa, bonSalva, altTeresa, altSalva, mensa, versatoTeresa, versatoSalva, totaleSpeso, quotaTeresa, quotaSalva, diffTeresa, diffSalva };
}

function calcolaTotaliGenerali() {
  const anni = getAnni();
  const initTot = () => ({ bonTeresa:0, bonSalva:0, altTeresa:0, altSalva:0, mensa:0, versatoTeresa:0, versatoSalva:0, totaleSpeso:0, quotaTeresa:0, quotaSalva:0, diffTeresa:0, diffSalva:0 });
  const p1 = initTot(); // Periodo <= 2023
  const p2 = initTot(); // Periodo >= 2024
  const tot = initTot(); // Gran totale
  
  for (const a of anni) {
    const q = calcolaQuote(a);
    const target = a <= 2023 ? p1 : p2;
    
    [target, tot].forEach(t => {
      t.bonTeresa += q.bonTeresa;
      t.bonSalva += q.bonSalva;
      t.altTeresa += q.altTeresa;
      t.altSalva += q.altSalva;
      t.mensa += q.mensa;
      t.versatoTeresa += q.versatoTeresa;
      t.versatoSalva += q.versatoSalva;
      t.totaleSpeso += q.totaleSpeso;
      t.quotaTeresa += q.quotaTeresa;
      t.quotaSalva += q.quotaSalva;
      t.diffTeresa += q.diffTeresa;
      t.diffSalva += q.diffSalva;
    });
  }
  return { p1, p2, tot };
}

function getAnni() {
  return [...new Set(S.transactions.map(t => t.anno))].sort((a, b) => b - a);
}

function drawChart(id, labels, data, colors) {
  if (S.charts[id]) { S.charts[id].destroy(); delete S.charts[id]; }
  const canvas = document.getElementById(id);
  if (!canvas || !data.some(v => v > 0)) return;
  const PALETTE = ['#4f46e5','#16a34a','#d97706','#dc2626','#0891b2'];
  S.charts[id] = new Chart(canvas.getContext('2d'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: (colors || PALETTE).slice(0, data.length), borderWidth: 2, borderColor: '#fff' }] },
    options: { cutout: '60%', plugins: { legend: { position: 'right', labels: { font: { family: "'DM Sans'", size: 11 }, boxWidth: 11, padding: 12 } } }, animation: { duration: 400 } },
  });
}

        <div class="form-group">
          <label class="form-label">Importo * (€)</label>
          <input name="importo" type="number" step="0.01" min="0" class="form-input mono" required placeholder="0.00" value="${editTx?.importo || ''}" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descrizione</label>
        <input name="descrizione" class="form-input" placeholder="Descrizione" value="${editTx?.descrizione || ''}" />
      </div>
      <div class="form-group">
        <label class="form-label">Causale</label>
        <input name="causale" class="form-input" placeholder="Causale (opzionale)" value="${editTx?.causale || ''}" />
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-action="close-modal">Annulla</button>
        <button type="submit" class="btn btn-primary">${isEdit ? 'Salva' : 'Aggiungi'}</button>
      </div>
    </form>
  `);

  $('modal-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd);
    const payload = {
      persona: data.persona, tipo: data.tipo, data: data.data,
      importo: parseFloat(data.importo), descrizione: data.descrizione || '',
      causale: data.causale || '', tipo_versamento: '',
      provenienza: isEdit ? undefined : 'MANUALE',
      anno: new Date(data.data).getFullYear(),
    };
    try {
      if (isEdit) {
        await sbUpd('acct_transactions', `id=eq.${editTx.id}`, payload);
      } else {
        await sbIns('acct_transactions', { ...payload, user_id: S.session.user.id });
      }
      closeModal();
      await reload();
    } catch (err) {
      alert('Errore: ' + err.message);
    }
  });
}

async function handleRevolutCSV(file) {
  const text = await file.text();
  // Rimuovi eventuali caratteri invisibili (BOM) all'inizio
  const cleanText = text.trim().replace(/^\uFEFF/, '');
  
  // Rileva separatore (virgola o punto e virgola)
  const firstLine = cleanText.split('\n')[0];
  const sep = firstLine.includes(';') ? ';' : ',';
  
  const rows = cleanText.split('\n').map(r => r.split(sep).map(c => c.trim().replace(/^"|"$/g, '')));
  if (rows.length < 2) return;
  
  const header = rows[0].map(h => h.toLowerCase());
  console.log('[Revolut Import] Header rilevati:', header);

  const findIdx = (names) => {
    for (const name of names) {
      const i = header.indexOf(name.toLowerCase());
      if (i !== -1) return i;
    }
    return -1;
  };

  const idx = {
    type:   findIdx(['Type', 'Tipo']),
    date:   findIdx(['Started Date', 'Data di inizio', 'Completed Date', 'Data di completamento', 'Data']),
    amount: findIdx(['Amount', 'Importo']),
    desc:   findIdx(['Description', 'Descrizione']),
    state:  findIdx(['State', 'Stato'])
  };

  console.log('[Revolut Import] Mappatura colonne:', idx);

  if (idx.type === -1 || idx.amount === -1) {
    console.error('[Revolut Import] Header mancanti. Type:', idx.type, 'Amount:', idx.amount);
    alert('Formato CSV Revolut non riconosciuto.\n\nAssicurati che il file contenga le colonne: Tipo, Data, Importo, Descrizione.');
    return;
  }

  const dataRows = rows.slice(1).filter(r => r.length >= Math.max(...Object.values(idx)));

  let imported = 0;
  let skipped = 0;

  for (const r of dataRows) {
    const status = (r[idx.state] || '').toUpperCase();
    if (status !== 'COMPLETED' && status !== 'COMPLETATO') continue;
    
    const type = (r[idx.type] || '').toUpperCase();
    const rawAmount = parseFloat(r[idx.amount]);
    const amount = Math.abs(rawAmount);
    const dateStr = r[idx.date].split(' ')[0]; // Prende solo la data YYYY-MM-DD
    const desc = r[idx.desc] || '';
    
    // Solo bonifici entranti (ricariche sul conto)
    if (!type.includes('RICARICA')) continue;
    const tipo = 'BONIFICO';

    // Logica di auto-assegnazione intelligente
    let persona = 'SALVATORE'; // Default
    const upperDesc = desc.toUpperCase();
    if (upperDesc.includes('TERESA') || upperDesc.includes('GARSIA')) persona = 'TERESA';
    if (upperDesc.includes('SALVATORE')) persona = 'SALVATORE';

    // Controllo duplicati base (data + importo + descrizione)
    const isDup = S.transactions.some(t => 
      t.data === dateStr && 
      Math.abs(parseFloat(t.importo)) === amount &&
      t.descrizione === desc
    );

    if (isDup) {
      skipped++;
      continue;
    }

    const payload = {
      user_id: S.session.user.id,
      anno: new Date(dateStr).getFullYear(),
      data: dateStr,
      persona: persona,
      tipo: tipo,
      importo: amount,
      descrizione: desc,
      causale: 'Importato da Revolut',
      provenienza: 'IMPORTATO'
    };

    await sbIns('acct_transactions', payload);
    imported++;
  }

  alert(`Importazione completata!\n\n✅ Transazioni caricate: ${imported}\n⏭️ Saltate (già presenti): ${skipped}`);
  await reload();
}

// ══════════ NAV / EVENTS ══════════

function navigate(view) {
  S.view = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const vEl = $(`view-${view}`);
  if (vEl) vEl.classList.add('active');
  const nEl = document.querySelector(`.nav-item[data-view="${view}"]`);
  if (nEl) nEl.classList.add('active');
  $('sidebar')?.classList.remove('open');
  $('mobile-nav-overlay')?.classList.remove('open');
  history.pushState({ view }, '');
  render();
}

window.addEventListener('popstate', e => {
  if (!e.state) return;
  const view = e.state.view || 'dashboard';
  S.view = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const vEl = $(`view-${view}`);
  if (vEl) vEl.classList.add('active');
  const nEl = document.querySelector(`.nav-item[data-view="${view}"]`);
  if (nEl) nEl.classList.add('active');
  render();
});

function render() {
  switch (S.view) {
    case 'dashboard': renderDashboard(); break;
    case 'bonifici': renderBonifici(); break;
    case 'spese': renderSpese(); break;
    case 'report': renderReport(); break;
    case 'revolut': renderRevolut(); break;
    case 'impostazioni': renderImpostazioni(); break;
  }
}

async function reload() {
  await loadData();
  render();
}

// ══════════ EVENTS ══════════

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'nav') {
    navigate(btn.dataset.view);
  } else if (action === 'close-modal') {
    closeModal();
  } else if (action === 'new-transaction') {
    openNewTxModal(null, btn.dataset.tipo || null);
  } else if (action === 'edit-tx') {
    openNewTxModal(btn.dataset.id);
  } else if (action === 'del-tx') {
    if (confirm('Eliminare questo movimento?')) {
      sbDel('acct_transactions', `id=eq.${btn.dataset.id}`).then(reload);
    }
  } else if (action === 'del-revolut-all') {
    if (confirm('Eliminare TUTTE le transazioni importate da Revolut per quest\'anno?')) {
      const ids = S.transactions.filter(t => t.causale === 'Importato da Revolut' && t.anno === S.selectedYear).map(t => t.id);
      if (ids.length === 0) return;
      Promise.all(ids.map(id => sbDel('acct_transactions', `id=eq.${id}`))).then(reload);
    }
  } else if (action === 'logout') {
    logout();
  }
});

document.addEventListener('change', async e => {
  if (e.target.id === 'revolut-csv-input') {
    const file = e.target.files[0];
    if (file) {
      const label = e.target.closest('label');
      const oldText = label ? label.textContent : '';
      if (label) { label.textContent = '⌛ Elaborazione...'; label.style.pointerEvents = 'none'; }
      try {
        await handleRevolutCSV(file);
      } finally {
        if (label) { label.textContent = oldText; label.style.pointerEvents = ''; }
        e.target.value = '';
      }
    }
  }
  if (e.target.matches('[data-action="year-filter"]')) {
    S.selectedYear = parseInt(e.target.value);
    render();
  }
});

document.getElementById('btn-hamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobile-nav-overlay').classList.toggle('open');
});
document.getElementById('mobile-nav-overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobile-nav-overlay').classList.remove('open');
});
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

async function init() {
  let session = null;

  // 1. Token condiviso da AppSphere launcher (sb_token in localStorage)
  const sbToken = localStorage.getItem('sb_token');
  if (sbToken) session = await initFromSbToken(sbToken);

  // 2. Sessione propria salvata
  if (!session) {
    session = loadSession();
    if (session && session.expires_at < Date.now()) {
      session = await refreshSession(session);
    }
  }

  if (!session) {
    location.href = 'finanza.html';
    return;
  }
  S.session = session;

  // BroadcastChannel AppSphere
  const _authChannel = new BroadcastChannel('appsphere_auth');
  _authChannel.onmessage = (e) => {
    if (!e.data) return;
    if (e.data.type === 'LOGOUT') {
      localStorage.removeItem('sb_token');
      location.href = 'finanza.html';
    } else if (e.data.type === 'TOKEN_REFRESH' && e.data.sbToken) {
      localStorage.setItem('sb_token', e.data.sbToken);
      if (S.session) S.session.access_token = e.data.sbToken;
    }
  };

  const u = session.user;
  // (nome non mostrato)
  if (u.user_metadata?.avatar_url) {
    $('user-avatar').innerHTML = `<img src="${u.user_metadata.avatar_url}" alt="" />`;
  } else {
    $('user-avatar').textContent = (u.user_metadata?.full_name || u.email || 'U')[0].toUpperCase();
  }

  try {
    await loadData();
  } catch (err) {
    console.error('Errore caricamento dati:', err);
  }

  $('screen-app').classList.remove('hidden');
  $('screen-app').style.display = 'flex';
  $('loading-overlay').classList.add('hidden');

  const anni = getAnni();
  $('footer-info').textContent = `${S.transactions.length} transazioni · ${anni.length} anni`;

  navigate('dashboard');
  history.replaceState({ view: 'dashboard' }, '');
}

init();
</script>
